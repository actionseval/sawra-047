name: CI

# on: [push, pull_request]
on: [repository_dispatch, workflow_dispatch]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.8'

      - name: Install dependencies
        run: |
          pip install coverage[toml]>=6.2,<8.0
          pip install mypy==1.19.1
          pip install pytest>=4.4.0,<9.0.0
          pip install pytest-cov>=2.10.0,<8.0.0
          pip install pytest-sugar>=0.9.4,<1.2.0
          pip install pytest-xdist>=1.32.0,<4.0.0
          pip install rich>=10.11.0
          pip install ruff==0.14.10
          pip install shellingham>=1.3.0

      - name: Run script
        run: |
          uv sync --locked --no-dev --group tests
          mkdir coverage
          uv run bash scripts/test-files.sh
          uv run bash scripts/test.sh